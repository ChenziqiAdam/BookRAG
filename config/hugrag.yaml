# HugRAG config — based on gbc.yaml with causal labeling enabled

pdf_path: /mnt/data/ziqi/BookRAG/BOOKRAG_VLDB_2026_full.pdf
save_path: ./outputs/hugrag

llm:
  model_name: Qwen3-8B
  api_key: openai
  api_base: http://10.20.12.23:8000/v1
  backend: openai
  max_tokens: 4096
  temperature: 0.1
  frequency_penalty: 0.0
  presence_penalty: 0.0
  max_workers: 8

vlm:
  model_name: Qwen2-5-VL
  api_key: openai
  api_base: http://localhost:8000/v1
  temperature: 0.1
  max_tokens: 6000
  backend: gpt

index:
  chunk_size: 512
  overlap: 50

mineru:
  backend: vlm-sglang-client
  method: vlm
  server_url: http://127.0.0.1:30001
  lang: en

tree:
  node_keywords: True
  node_summary: True

graph:
  extractor_type: "llm"
  local_model_name: "en_core_web_sm"
  image_description_force: True
  max_gleaning: 0
  refine_type: "advanced"
  # HugRAG: enable causal edge labeling after KG construction
  causal_labeling: true
  embedding_config:
    model_name: text-embedding-ada-002
    backend: openai
    max_length: 4096
    device: "cuda:2"
    api_base: "http://localhost:9999/v1"
  reranker_config:
    model_name: bge-reranker-v2-m3
    max_length: 4096
    device: "cuda:2"
    backend: vllm
    api_base: "http://localhost:9998/v1"

vdb:
  mm_embedding: True
  vdb_dir_name: "Tree_vdb"
  collection_name: "TreeVDB"
  embedding_config:
    model_name: /mnt/data/ziqi/sentence-transformers/gme-Qwen2-VL-2B-Instruct
    device: "cuda:0"

rag_force_reprocess: True

rag:
  strategy: gbc
  variant: hugrag
  topk: 10
  sim_threshold: 0.3
  select_depth: 2
  max_retry: 2
  # HugRAG retrieval parameters
  causal_boost: 2.0
  gate_boost: 3.0
  top_k_module: 3
  reranker_config:
    model_name: bge-reranker-v2-m3
    max_length: 4096
    device: "cuda:2"
    backend: vllm
    api_base: "http://localhost:9998/v1"
  mm_reranker_config:
    model_name: /mnt/data/ziqi/sentence-transformers/gme-Qwen2-VL-2B-Instruct
    device: "cuda:0"
